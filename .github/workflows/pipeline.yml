name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ci-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r oss-core/requirements.txt
          pip install -r simulators/requirements.txt

      - name: Lint with flake8
        run: |
          # Stop the build on critical errors
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics          
          # Show warnings for minor style issues
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests with pytest
        working-directory: ./oss-core
        env:
          TARGET_EMS_HOST: ${{ secrets.TARGET_EMS_HOST }}
          TARGET_EMS_PORT: ${{ secrets.TARGET_EMS_PORT }}
        run: |
          pytest -v

  cd-deploy:
    needs: ci-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2
        run: |
          # 1. Copy files to target directory
          mkdir -p /home/ubuntu/oss-playground
          cp -r ./* /home/ubuntu/oss-playground/
          cd /home/ubuntu/oss-playground

          # 1-1. Ensure correct permissions
          sudo chown -R ubuntu:ubuntu /home/ubuntu/oss-playground
          
          # 2. Setup virtual environment & install packages
          python3 -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install -r oss-core/requirements.txt
          ./venv/bin/pip install -r simulators/requirements.txt
          
          # 3. Stop existing services safely
          pkill -f "uvicorn app.main:app" || true
          pkill -f "python simulators/mock_ems.py" || true
          sleep 2  # Wait for processes to terminate
          
          # 4. Restart services in the background
          nohup ./venv/bin/python simulators/mock_ems.py > ems.log 2>&1 &
          sleep 3 # Wait for services to start
          
          cd oss-core
          nohup ../venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 > ../oss.log 2>&1 &
          sleep 3 # Wait for services to start
          cd ..
          