name: EC2 Continuous Deployment (Self-Hosted)

on:
  push:
    branches:
      - main  # Triggered only when code is pushed to the main branch

jobs:
  deploy:
    runs-on: self-hosted  # Uses the runner installed inside your EC2

    steps:
      - name: 📥 Checkout Source Code
        uses: actions/checkout@v4

      - name: 🚀 Setup Environment and Restart Servers
        run: |
          echo "🚀 Starting deployment inside EC2..."
          
          # 1. Copy and move files
          mkdir -p /home/ubuntu/oss-playground
          cp -r ./* /home/ubuntu/oss-playground/
          cd /home/ubuntu/oss-playground
          
          # 2. Install dependencies
          # Using --upgrade and --no-cache-dir for efficient updates
          pip3 install --upgrade -r oss-core/requirements.txt --no-cache-dir
          pip3 install --upgrade -r simulators/requirements.txt --no-cache-dir
          
          # 3. Setup virtual environment (optional but recommended for isolation)
          python3 -m venv venv
          source venv/bin/activate
          
          # 4. ⭐️ Terminate all related processes (Uvicorn & EMS)
          echo "🛑 Stopping existing servers and EMS..."
          pkill -f uvicorn || true
          pkill -f mock_ems.py || true
          # Note: mock_bss.py is intended to be manually started/stopped in the terminal
          
          # 5. ⭐️ Restart Core server and EMS simulator in the background
          echo "🟢 Restarting services with the new code..."
          
          # Restart EMS (Port 9999)
          nohup venv/bin/python simulators/mock_ems.py > ems.log 2>&1 &
          
          # Restart OSS Server (Port 8000)
          cd oss-core
          nohup ../venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 > ../oss.log 2>&1 &
          
          echo "✅ Deployment completed successfully!"