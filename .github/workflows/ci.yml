name: OSS Core CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r oss-core/requirements.txt
          pip install -r simulators/requirements.txt

      - name: Lint with flake8
        # Check for syntax errors and code style issues before running tests
        run: |
          # 1. Stop the build if there are critical Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics          
          # 2. Show warnings for minor style issues (e.g., line length), but do not fail the CI (--exit-zero)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests with pytest
        working-directory: ./oss-core
        env:
          TARGET_EMS_HOST: ${{ secrets.TARGET_EMS_HOST }}
          TARGET_EMS_PORT: ${{ secrets.TARGET_EMS_PORT }}
        run: |
          pytest -v