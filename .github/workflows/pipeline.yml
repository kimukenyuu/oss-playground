name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ci-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r oss-core/requirements.txt
          pip install -r simulators/requirements.txt

      - name: Lint with flake8
        run: |
          # Stop the build on critical errors
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics          
          # Show warnings for minor style issues
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests with pytest
        working-directory: ./oss-core
        env:
          TARGET_EMS_HOST: ${{ secrets.TARGET_EMS_HOST }}
          TARGET_EMS_PORT: ${{ secrets.TARGET_EMS_PORT }}
        run: |
          pytest -v

  cd-deploy:
    needs: ci-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Copy files to EC2 via SCP
      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/ubuntu/oss-playground"

      # 2. Connect via SSH and execute deployment commands
      - name: Execute deployment scripts via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Executing commands directly on the EC2 instance
            cd /home/ubuntu/oss-playground
            
            # Setup virtual environment and install packages
            python3 -m venv venv
            ./venv/bin/pip install --upgrade pip
            ./venv/bin/pip install -r oss-core/requirements.txt
            ./venv/bin/pip install -r simulators/requirements.txt
            
            # Safely terminate existing processes on target ports
            sudo fuser -k 8000/tcp || true
            sudo fuser -k 9999/tcp || true
            sleep 2
            
            # Restart services in the background (nohup is safe here due to SSH session)
            nohup ./venv/bin/python simulators/mock_ems.py > ems.log 2>&1 &
            sleep 3
            
            cd oss-core
            nohup ../venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 > ../oss.log 2>&1 &
            sleep 3