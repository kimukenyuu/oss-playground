name: EC2 Continuous Deployment (Self-Hosted)

on:
  push:
    branches:
      - main  

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: 📥 Checkout Source Code
        uses: actions/checkout@v4

      - name: 🚀 Setup Environment and Restart Servers
        run: |
          echo "🚀 Starting deployment inside EC2..."
          
          # 1. Copy files to the deployment directory
          mkdir -p /home/ubuntu/oss-playground
          cp -r ./* /home/ubuntu/oss-playground/
          cd /home/ubuntu/oss-playground
          
          # 2. Create a virtual environment (Fixes PEP 668 error)
          python3 -m venv venv
          
          # 3. Install dependencies using the venv's pip directly
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install -r oss-core/requirements.txt
          ./venv/bin/pip install -r simulators/requirements.txt
          
          # 4. ⭐️ Terminate existing processes
          echo "🛑 Stopping existing servers and EMS..."
          pkill -f uvicorn || true
          pkill -f mock_ems.py || true
          
          # 5. ⭐️ Restart services using the virtual environment
          echo "🟢 Restarting services in virtual environment..."
          
          # Restart EMS (Port 9999)
          nohup ./venv/bin/python simulators/mock_ems.py > ems.log 2>&1 &
          
          # Restart OSS Server (Port 8000)
          cd oss-core
          nohup ../venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 > ../oss.log 2>&1 &
          
          echo "✅ Deployment completed successfully!"